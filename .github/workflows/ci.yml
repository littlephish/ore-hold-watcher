name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # engine/parser tests are pure stdlib — no Qt needed
      - run: python test_engine.py

  build-exe:
    name: Build Windows exe (Nuitka)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt nuitka

      - name: Cache Nuitka compilation cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Build
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --windows-icon-from-ico=icon.ico `
            --company-name="LittlePhish" `
            --product-name="Ore Hold Watcher" `
            --file-version="1.0.${{ github.run_number }}" `
            --product-version="1.0.${{ github.run_number }}" `
            --output-filename=OreHoldWatcher.exe `
            --output-dir=build `
            app.py

      - uses: actions/upload-artifact@v4
        with:
          name: OreHoldWatcher-${{ github.sha }}
          path: build/OreHoldWatcher.exe
          if-no-files-found: error
